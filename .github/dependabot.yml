version: 2

multi-ecosystem-groups:
  default:
    schedule:
      interval: cron
      cronjob: every day at 7am

updates:
- package-ecosystem: github-actions
  directory: /
  patterns:
  - '*'
  groups:
    github-actions:
      patterns:
      - '*'
  cooldown:
    default-days: 7
  multi-ecosystem-group: default

- package-ecosystem: npm
  directory: /
  patterns:
  - '*'
  groups:
    npm:
      patterns:
      - '*'
  ignore:
  - dependency-name: '@types/node' # Don't surpass the node engine version
    update-types:
    - version-update:semver-major
  cooldown:
    default-days: 7
  multi-ecosystem-group: default
