version: 2
updates:
- package-ecosystem: npm
  directory: /
  schedule:
    interval: weekly
  ignore:
  - dependency-name: '@types/node'
    update-types:
    - version-update:semver-major
  # Keep TypeScript on v5 until typescript-eslint supports v6:
  # https://github.com/typescript-eslint/typescript-eslint/issues/12123
  - dependency-name: typescript
    update-types:
    - version-update:semver-major
  # Keep ESLint on v9 until eslint-config-next is compatible with v10:
  # https://github.com/vercel/next.js/issues/89764
  - dependency-name: eslint
    update-types:
    - version-update:semver-major
  groups:
    app:
      patterns:
      - next
      - react
      - react-dom
    lint-and-types:
      patterns:
      - eslint
      - eslint-*
      - '@typescript-eslint/*'
      - typescript
      - '@types/*'
    test:
      patterns:
      - vitest
      - '@vitest/*'
    styling:
      patterns:
      - tailwindcss
      - '@tailwindcss/*'

- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
  groups:
    github-actions:
      patterns:
      - '*'
