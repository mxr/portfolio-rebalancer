name: tests

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      project_files: ${{ steps.filter.outputs.project_files }}
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
      id: filter
      with:
        filters: |
          project_files:
            - .github/workflows/**
            - app/**
            - lib/**
            - tests/**
            - scripts/**
            - '**/*.css'
            - '**/*.js'
            - '**/*.jsx'
            - '**/*.mjs'
            - '**/*.mts'
            - '**/*.ts'
            - '**/*.tsx'
            - '**/*.json'
            - package.json
            - package-lock.json

  test-real:
    needs: [changes]
    if: needs.changes.outputs.project_files == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: package.json
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Run lint (auto-fix)
      run: npm run lint

    - name: Run tests with coverage
      run: npm run test:coverage

    - name: Upload coverage report
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: coverage-report
        path: coverage

  test:
    needs: [changes, test-real]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - env:
        PROJECT_FILES: ${{ needs.changes.outputs.project_files }}
        TEST_REAL_RESULT: ${{ needs.test-real.result }}
      run: |
        if [ "$PROJECT_FILES" != "true" ]; then
          exit 0
        fi
        if [ "$TEST_REAL_RESULT" != "success" ]; then
          exit 1
        fi
